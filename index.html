<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aventura Lectora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Pequeño ajuste para que los botones se sientan más como una App */
        .game-card {
            transition: transform 0.2s active;
        }
        .game-card:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="bg-slate-50 font-sans antialiased text-slate-900">

    <div id="home" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
    <div class="bg-blue-600 w-20 h-20 rounded-2xl flex items-center justify-center text-white text-4xl mb-6 shadow-xl">
        <i class="fas fa-graduation-cap"></i>
    </div>
    <h1 class="text-4xl font-extrabold text-slate-800 mb-2">Aventura Lectora</h1>
    <p class="text-slate-500 mb-8 max-w-xs">Plataforma educativa de comprensión y análisis de textos</p>
    
    <div class="w-full max-w-xs mb-6">
        <input type="text" id="user-name-input" 
            class="w-full p-4 border-2 border-slate-200 rounded-2xl focus:border-blue-500 outline-none transition-all text-center font-bold" 
            placeholder="Escribe tu nombre aquí...">
    </div>

    <button onclick="startApp()" class="bg-blue-600 text-white px-10 py-4 rounded-full font-bold shadow-lg hover:bg-blue-700 transition-all uppercase tracking-wider active:scale-95">
    Ingresar
</button>
    <p class="mt-8 text-xs text-slate-400 font-mono">v1.1 - Proyecto Educativo</p>
</div>

    <div id="menu" class="hidden min-h-screen p-6 animate-fade-in">
        <header class="mb-8 flex justify-between items-center">
            <div>
                <h2 class="text-2xl font-bold text-slate-800">
    Hola, <span id="user-display-name">Usuario</span>
</h2>
                <p class="text-sm text-slate-500">¿Qué desafío resolveremos hoy?</p>
            </div>
            <div class="w-10 h-10 bg-slate-200 rounded-full flex items-center justify-center">
                <i class="fas fa-user text-slate-600"></i>
            </div>
        </header>

        <div class="grid grid-cols-1 gap-4 max-w-md mx-auto pb-10">
            
            <button onclick="showSection('game-lectura')" class="game-card flex items-center p-4 bg-white rounded-2xl shadow-sm border border-slate-100">
                <div class="bg-blue-100 p-3 rounded-xl mr-4 text-blue-600"><i class="fas fa-file-alt"></i></div>
                <div class="text-left">
                    <h3 class="font-bold text-slate-700">Lectura Corta</h3>
                    <p class="text-xs text-slate-500">Interpretación e inferencia</p>
                </div>
            </button>

            <button onclick="showSection('game-ordenar')" class="game-card flex items-center p-4 bg-white rounded-2xl shadow-sm border border-slate-100">
                <div class="bg-green-100 p-3 rounded-xl mr-4 text-green-600"><i class="fas fa-stream"></i></div>
                <div class="text-left">
                    <h3 class="font-bold text-slate-700">Ordenar Texto</h3>
                    <p class="text-xs text-slate-500">Coherencia y estructura global</p>
                </div>
            </button>

            <button onclick="showSection('game-lectura')" class="game-card flex items-center p-4 bg-white rounded-2xl shadow-sm border border-slate-100">
                <div class="bg-yellow-100 p-3 rounded-xl mr-4 text-yellow-600"><i class="fas fa-lightbulb"></i></div>
                <div class="text-left">
                    <h3 class="font-bold text-slate-700">Idea Principal</h3>
                    <p class="text-xs text-slate-500">Análisis y síntesis de ideas</p>
                </div>
            </button>

            <button onclick="showSection('game-completar')" class="game-card flex items-center p-4 bg-white rounded-2xl shadow-sm border border-slate-100">
                <div class="bg-purple-100 p-3 rounded-xl mr-4 text-purple-600"><i class="fas fa-pen-nib"></i></div>
                <div class="text-left">
                    <h3 class="font-bold text-slate-700">Completar Texto</h3>
                    <p class="text-xs text-slate-500">Vocabulario y contexto</p>
                </div>
            </button>

            <button onclick="showSection('game-errores')" class="game-card flex items-center p-4 bg-white rounded-2xl shadow-sm border border-slate-100">
                <div class="bg-red-100 p-3 rounded-xl mr-4 text-red-600"><i class="fas fa-spell-check"></i></div>
                <div class="text-left">
                    <h3 class="font-bold text-slate-700">Detectar Errores</h3>
                    <p class="text-xs text-slate-500">Ortografía para secundaria</p>
                </div>
            </button>

            <button onclick="showSection('game-ahorcado')" class="game-card flex items-center p-4 bg-white rounded-2xl shadow-sm border border-slate-100">
                <div class="bg-orange-100 p-3 rounded-xl mr-4 text-orange-600"><i class="fas fa-font"></i></div>
                <div class="text-left">
                    <h3 class="font-bold text-slate-700">Ahorcado</h3>
                    <p class="text-xs text-slate-500">Reglas de escritura</p>
                </div>
            </button>

            <button onclick="showSection('game-escape')" class="game-card flex items-center p-4 bg-slate-800 rounded-2xl shadow-lg border border-slate-700">
                <div class="bg-slate-700 p-3 rounded-xl mr-4 text-yellow-400"><i class="fas fa-key"></i></div>
                <div class="text-left">
                    <h3 class="font-bold text-white">Escape Room</h3>
                    <p class="text-xs text-slate-400">Desafío final con acertijos</p>
                </div>
            </button>
        </div>
    </div>

    <div id="game-container" class="hidden p-6 min-h-screen">
        <header class="flex items-center mb-6">
            <button onclick="showSection('menu')" class="w-10 h-10 flex items-center justify-center rounded-full bg-white shadow-sm text-slate-600 mr-4">
                <i class="fas fa-arrow-left"></i>
            </button>
            <span class="font-bold text-slate-500 uppercase text-xs tracking-widest">Actividad en curso</span>
        </header>

        <div id="game-content" class="bg-white p-6 rounded-3xl shadow-xl border border-slate-100 animate-slide-up">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
