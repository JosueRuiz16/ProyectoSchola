<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aventura Lectora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .game-card {
            transition: all 0.2s ease;
        }
        .game-card:active {
            transform: scale(0.95);
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
        
        @keyframes float-slow {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.6; }
            50% { transform: translateY(-20px) rotate(15deg); opacity: 0.9; }
        }
        .floating-ornament {
            position: absolute;
            pointer-events: none;
            animation: float-slow 4s ease-in-out infinite;
            font-size: 1.5rem;
            z-index: 0;
        }

        /* Animación para la nueva notificación profesional */
        @keyframes slide-in-top {
            0% { transform: translateY(-100%) translateX(-50%); opacity: 0; }
            100% { transform: translateY(0) translateX(-50%); opacity: 1; }
        }
        .animate-toast { animation: slide-in-top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body class="bg-slate-50 font-sans antialiased text-slate-900 transition-colors duration-500">

    <div id="toast-container" class="fixed top-5 left-1/2 -translate-x-1/2 z-50 pointer-events-none w-full max-w-xs"></div>

    <div id="home" class="min-h-screen flex flex-col items-center justify-center p-6 text-center bg-gradient-to-br from-blue-50 to-indigo-100">
        <div class="bg-blue-600 w-20 h-20 rounded-2xl flex items-center justify-center text-white text-4xl mb-6 shadow-xl animate-bounce">
            <i class="fas fa-graduation-cap"></i>
        </div>
        <h1 class="text-4xl font-extrabold text-slate-800 mb-2 tracking-tight">Aventura Lectora</h1>
        <p class="text-slate-500 mb-8 max-w-xs">Plataforma educativa de comprensión y análisis de textos</p>
        
        <div class="w-full max-w-xs mb-6">
            <input type="text" id="user-name-input" 
                class="w-full p-4 border-2 border-slate-200 rounded-2xl focus:border-blue-500 outline-none transition-all text-center font-bold shadow-sm text-lg" 
                placeholder="Escribe tu nombre aquí...">
        </div>

        <button onclick="startApp()" class="bg-blue-600 text-white px-10 py-4 rounded-full font-bold shadow-lg hover:bg-blue-700 transition-all uppercase tracking-wider active:scale-95">
            Ingresar
        </button>
        <p class="mt-8 text-xs text-slate-400 font-mono">v1.3 - Edición Gamificada</p>
    </div>

    <div id="menu" class="hidden min-h-screen p-6 max-w-md mx-auto">
        <header class="mb-6 flex justify-between items-center">
            <div>
                <h2 class="text-2xl font-bold text-slate-800">
                    Hola, <span id="user-display-name" class="text-blue-600">Usuario</span>
                </h2>
                <p class="text-sm text-slate-500">¿Qué desafío resolveremos hoy?</p>
            </div>
            <div class="flex items-center space-x-2">
                <div class="bg-slate-100 px-3 py-1.5 rounded-xl text-center shadow-sm">
                    <span class="text-xs font-bold text-slate-400 block tracking-wider uppercase" style="font-size: 9px;">Puntos</span>
                    <span id="menu-score" class="font-black text-blue-600 text-sm">0 ⭐</span>
                </div>
                <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 shadow-sm">
                    <i class="fas fa-user"></i>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 gap-4 pb-10">
            <button onclick="showSection('game-lectura')" class="game-card flex items-center p-4 bg-white rounded-2xl shadow-sm border border-slate-100 hover:border-green-300 hover:shadow-md">
                <div class="bg-green-100 p-3 rounded-xl mr-4 text-green-600"><i class="fas fa-leaf"></i></div>
                <div class="text-left flex-1">
                    <h3 class="font-bold text-slate-700">Lectura Corta</h3>
                    <p class="text-xs text-slate-500">Estación: Primavera 🌸</p>
                </div>
                <i class="fas fa-chevron-right text-slate-300 text-xs"></i>
            </button>

            <button onclick="showSection('game-ordenar')" class="game-card flex items-center p-4 bg-white rounded-2xl shadow-sm border border-slate-100 hover:border-yellow-300 hover:shadow-md">
                <div class="bg-yellow-100 p-3 rounded-xl mr-4 text-yellow-600"><i class="fas fa-sun"></i></div>
                <div class="text-left flex-1">
                    <h3 class="font-bold text-slate-700">Ordenar Texto</h3>
                    <p class="text-xs text-slate-500">Estación: Verano ☀️</p>
                </div>
                <i class="fas fa-chevron-right text-slate-300 text-xs"></i>
            </button>

            <button onclick="showSection('game-ideaprincipal')" class="game-card flex items-center p-4 bg-white rounded-2xl shadow-sm border border-slate-100 hover:border-amber-500 hover:shadow-md">
                <div class="bg-amber-100 p-3 rounded-xl mr-4 text-amber-700"><i class="fas fa-cloud-sun-rain"></i></div>
                <div class="text-left flex-1">
                    <h3 class="font-bold text-slate-700">Idea Principal</h3>
                    <p class="text-xs text-slate-500">Estación: Otoño 🍂</p>
                </div>
                <i class="fas fa-chevron-right text-slate-300 text-xs"></i>
            </button>

            <button onclick="showSection('game-completar')" class="game-card flex items-center p-4 bg-white rounded-2xl shadow-sm border border-slate-100 hover:border-blue-300 hover:shadow-md">
                <div class="bg-blue-100 p-3 rounded-xl mr-4 text-blue-600"><i class="fas fa-snowflake"></i></div>
                <div class="text-left flex-1">
                    <h3 class="font-bold text-slate-700">Completar Texto</h3>
                    <p class="text-xs text-slate-500">Estación: Invierno ❄️</p>
                </div>
                <i class="fas fa-chevron-right text-slate-300 text-xs"></i>
            </button>

            <button onclick="showSection('game-errores')" class="game-card flex items-center p-4 bg-white rounded-2xl shadow-sm border border-slate-100 hover:border-purple-300 hover:shadow-md">
                <div class="bg-purple-100 p-3 rounded-xl mr-4 text-purple-600"><i class="fas fa-ghost"></i></div>
                <div class="text-left flex-1">
                    <h3 class="font-bold text-slate-700">Detectar Errores</h3>
                    <p class="text-xs text-slate-500">Festividad: Halloween 🎃</p>
                </div>
                <i class="fas fa-chevron-right text-slate-300 text-xs"></i>
            </button>

            <button onclick="showSection('game-ahorcado')" class="game-card flex items-center p-4 bg-white rounded-2xl shadow-sm border border-slate-100 hover:border-orange-300 hover:shadow-md">
                <div class="bg-orange-100 p-3 rounded-xl mr-4 text-orange-600"><i class="fas fa-guitar"></i></div>
                <div class="text-left flex-1">
                    <h3 class="font-bold text-slate-700">Ahorcado</h3>
                    <p class="text-xs text-slate-500">Festividad: Folklore 💀</p>
                </div>
                <i class="fas fa-chevron-right text-slate-300 text-xs"></i>
            </button>

            <button onclick="showSection('game-escape')" class="game-card flex items-center p-4 bg-slate-800 rounded-2xl shadow-lg border border-slate-700 hover:bg-slate-900">
                <div class="bg-red-600 p-3 rounded-xl mr-4 text-white"><i class="fas fa-gift"></i></div>
                <div class="text-left flex-1">
                    <h3 class="font-bold text-white">Escape Room</h3>
                    <p class="text-xs text-red-300">Festividad: Navidad Cyber 🎄</p>
                </div>
                <i class="fas fa-chevron-right text-yellow-400 text-xs"></i>
            </button>
        </div>
    </div>

    <div id="game-container" class="hidden min-h-screen p-6 relative overflow-hidden">
        <div id="ornaments-layer" class="absolute inset-0 pointer-events-none overflow-hidden"></div>

        <div class="max-w-md mx-auto relative z-10">
            <header class="flex items-center justify-between mb-6">
                <div class="flex items-center">
                    <button onclick="showSection('menu')" class="w-10 h-10 flex items-center justify-center rounded-full bg-white shadow-md text-slate-600 mr-3 active:scale-95 transition-all">
                        <i class="fas fa-arrow-left"></i>
                    </button>
                    <span id="game-badge" class="font-bold text-xs uppercase tracking-widest bg-white/80 px-3 py-1 rounded-full shadow-sm backdrop-blur-sm">Actividad</span>
                </div>
                
                <div class="flex space-x-2">
                    <div class="bg-white/80 backdrop-blur-sm px-3 py-1 rounded-xl font-bold text-xs shadow-sm text-slate-700">
                        ⭐ <span id="hud-score">0</span> pts
                    </div>
                    <div class="bg-white/80 backdrop-blur-sm px-3 py-1 rounded-xl font-bold text-xs shadow-sm text-red-600">
                        ❌ <span id="hud-wrong">0</span>
                    </div>
                </div>
            </header>

            <div id="game-content" class="bg-white/90 backdrop-blur-md p-6 rounded-3xl shadow-xl border border-white/50 transition-all">
                </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
